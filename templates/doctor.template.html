<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>{{META_TITLE}}</title>
  <meta name="description" content="{{META_DESCRIPTION}}">
  <link rel="canonical" href="https://manohardentalvisakhapatnam.com/doctors/{{SLUG}}/">
  
  <!-- Favicons -->
  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <link rel="icon" href="/assets/images/branding/favicon-192x192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="/assets/images/branding/apple-touch-icon.png">

  <!-- Style Sheets -->
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/pages.css">
</head>
<body>

  <!-- Scroll Progress Indicator -->
  <div class="scroll-progress"></div>

  <!-- HEADER_SECTION -->

  <!-- Page Hero -->
  <section class="page-hero">
    <div class="container">
      <h1>{{DOCTOR_NAME}}</h1>
      <div class="breadcrumbs">
        <a href="/index.html">Home</a> / <a href="/about/index.html">About Us</a> / <span>Team Bio</span>
      </div>
    </div>
  </section>

  <!-- Doctor Bio Section -->
  <section class="section-padding reveal">
    <div class="container">
      <div class="doctor-split">
        <div class="doctor-image-container">
          <img src="{{DOCTOR_IMAGE}}" alt="{{DOCTOR_NAME}} - Specialist">
        </div>
        <div class="doctor-info-panel">
          <h2>{{DOCTOR_NAME}}</h2>
          <div class="doctor-tagline">{{DOCTOR_TAGLINE}}</div>
          <p class="bio-text">{{DOCTOR_BIO}}</p>
          
          <div class="credentials-grid">
            {{CREDENTIALS_CONTENT}}
          </div>
          
          <a href="/contact/index.html" class="btn btn-primary">Book Consultation Session</a>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER_SECTION -->

  <!-- Scripts -->
  <script src="/assets/js/main.js"></script>
  <script src="/assets/js/navigation.js"></script>
  <script src="/assets/js/animations.js"></script>
  <script src="/assets/js/carousel.js"></script>
  <script src="/assets/js/forms.js"></script>
  <script src="/assets/js/utilities.js"></script>
</body>
</html>
